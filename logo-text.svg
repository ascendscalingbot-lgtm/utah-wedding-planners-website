<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- UTAH text -->
  <text x="10" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2" fill="#f5f1ea">UTAH</text>
  
  <!-- Wedding script -->
  <text x="40" y="50" font-family="'Brush Script MT', cursive" font-size="28" font-style="italic" fill="#f5f1ea">Wedding</text>
  
  <!-- Ring icon -->
  <g transform="translate(135, 30)">
    <circle cx="10" cy="10" r="6" stroke="#f5f1ea" stroke-width="1.5" fill="none"/>
